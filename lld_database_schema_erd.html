
<style>
#erd svg { width: 100%; }
</style>
<div id="erd" style="padding: 8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS {
    uuid id PK
    string name
    string email
    string password_hash
    enum role
    string department
    timestamp created_at
  }
  LEAVE_TYPES {
    int id PK
    string name
    int max_days_student
    int max_days_faculty
    boolean requires_proof
  }
  LEAVE_BALANCE {
    uuid id PK
    uuid user_id FK
    int year
    int entitled_days
    int used_days
    int remaining_days
  }
  LEAVE_REQUESTS {
    uuid id PK
    uuid applicant_id FK
    int leave_type_id FK
    date start_date
    date end_date
    int total_days
    string reason
    enum status
    string decided_by
    string decision_reason
    timestamp created_at
    timestamp decided_at
  }
  AUTOMATION_LOG {
    uuid id PK
    uuid leave_id FK
    string rule_verdict
    string ai_verdict
    string final_decision
    string ai_reason
    int ai_confidence
    timestamp logged_at
  }
  ADMIN_OVERRIDES {
    uuid id PK
    uuid leave_id FK
    uuid admin_id FK
    enum prev_status
    enum new_status
    string override_reason
    timestamp overridden_at
  }
  USERS ||--o{ LEAVE_REQUESTS : applies
  USERS ||--o{ LEAVE_BALANCE : has
  LEAVE_TYPES ||--o{ LEAVE_REQUESTS : categorises
  LEAVE_REQUESTS ||--o| AUTOMATION_LOG : logged_in
  LEAVE_REQUESTS ||--o| ADMIN_OVERRIDES : overridden_by
  USERS ||--o{ ADMIN_OVERRIDES : performs
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
